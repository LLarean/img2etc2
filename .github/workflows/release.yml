name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build .unitypackage
        run: python3 build_unitypackage.py "IMG2ETC2_${{ github.ref_name }}.unitypackage"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "IMG2ETC2_${{ github.ref_name }}.unitypackage"
          generate_release_notes: true
